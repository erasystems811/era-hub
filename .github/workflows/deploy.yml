name: Deploy ERA Hub

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_PATIENT_API_URL: https://api.erasystems.com.ng
          VITE_COMMS_API_URL: https://comms.erasystems.com.ng
          VITE_COMMS_OPERATOR_SECRET: ${{ secrets.OPERATOR_SECRET }}
        run: npm run build

      - name: Upload files to server
        uses: appleboy/scp-action@master
        with:
          host: 46.101.83.26
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: /var/www/era-hub
          strip_components: 1

      - name: Fix permissions + apply nginx
        uses: appleboy/ssh-action@master
        with:
          host: 46.101.83.26
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            chmod -R 755 /var/www/era-hub/
            cd /opt/era-comms && git pull origin main 2>/dev/null || true
            cp /opt/era-comms/scripts/nginx.conf /etc/nginx/sites-available/era-comms 2>/dev/null || true
            nginx -t && systemctl reload nginx 2>/dev/null || true
